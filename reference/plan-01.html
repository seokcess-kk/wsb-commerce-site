// ===== localStorage adapter (replaces window.storage from artifacts environment) =====
window.storage = {
  get: async (key) => {
    try {
      const v = localStorage.getItem(key);
      return v !== null ? { key, value: v, shared: false } : null;
    } catch (e) { return null; }
  },
  set: async (key, value) => {
    try {
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    } catch (e) { return null; }
  },
  delete: async (key) => {
    try {
      localStorage.removeItem(key);
      return { key, deleted: true, shared: false };
    } catch (e) { return null; }
  }
};

// Map a section to its tab based on part number
function getSectionTab(section) {
  const p = section.part;
  if (typeof p === 'string' && p.startsWith('b')) return 'brand';
  if (typeof p === 'string' && p.startsWith('c')) return 'commerce';
  if (p === 2) return 'brand';     // legacy compatibility
  if (p === 3) return 'commerce';  // legacy compatibility
  return 'common';
}

// ========== Helper Components ==========

function Tooltip({ text }) {
  if (!text) return null;
  return (
    <span className="relative inline-flex items-center group ml-1.5 align-middle">
      <HelpCircle size={13} className="text-stone-400 hover:text-stone-700 cursor-help" />
      <span className="invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-opacity absolute left-1/2 -translate-x-1/2 bottom-full mb-2 z-50 w-64 px-3 py-2 bg-stone-900 text-white text-xs rounded-md shadow-lg leading-relaxed pointer-events-none">
        {text}
        <span className="absolute left-1/2 top-full -translate-x-1/2 -mt-px border-4 border-transparent border-t-stone-900" />
      </span>
    </span>
  );
}

function RequiredMark({ show }) {
  if (!show) return null;
  return <span className="text-rose-500 ml-0.5" aria-label="필수">*</span>;
}

function FieldLabel({ label, required, tooltip, htmlFor, className = '' }) {
  return (
    <label htmlFor={htmlFor} className={`text-sm font-medium text-stone-700 ${className}`}>
      {label}
      <RequiredMark show={required} />
      <Tooltip text={tooltip} />
    </label>
  );
}

// ========== Field Components ==========

function TextField({ id, value, onChange, placeholder, multi }) {
  if (multi) {
    return (
      <textarea
        value={value || ''}
        onChange={e => onChange(id, e.target.value)}
        placeholder={placeholder || ''}
        rows={3}
        className="w-full px-4 py-3 bg-white border border-stone-300 rounded-md text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent resize-y text-sm leading-relaxed"
      />
    );
  }
  return (
    <input
      type="text"
      value={value || ''}
      onChange={e => onChange(id, e.target.value)}
      placeholder={placeholder || ''}
      className="w-full px-4 py-2.5 bg-white border border-stone-300 rounded-md text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent text-sm"
    />
  );
}

function DateField({ id, value, onChange }) {
  return (
    <input
      type="date"
      value={value || ''}
      onChange={e => onChange(id, e.target.value)}
      className="px-4 py-2.5 bg-white border border-stone-300 rounded-md text-stone-900 focus:outline-none focus:ring-2 focus:ring-stone-900 focus:border-transparent text-sm"
    />
  );
}

function MultiCheck({ id, value, onChange, options }) {
  const selected = value || [];
  const toggle = (opt) => {
    const next = selected.includes(opt) ? selected.filter(s => s !== opt) : [...selected, opt];
    onChange(id, next);
  };
  return (
    <div className="flex flex-wrap gap-2">
      {options.map(opt => {
        const on = selected.includes(opt);
        return (
          <button
            key={opt}
            type="button"
            onClick={() => toggle(opt)}
            className={`px-3.5 py-1.5 rounded-full text-xs font-medium border transition-all ${
              on
                ? 'bg-stone-900 text-white border-stone-900 shadow-sm'
                : 'bg-white text-stone-600 border-stone-300 hover:border-stone-500 hover:text-stone-900'
            }`}
          >
            {on && <span className="mr-1">✓</span>}{opt}
          </button>
        );
      })}
    </div>
  );
}

          className="mt-1 w-full px-2 py-1 bg-transparent border-0 border-b border-stone-200 text-xs text-stone-600 placeholder-stone-400 focus:outline-none focus:border-stone-500"
        />
      </div>
    </div>
  );
}

function ReferencesTable({ value, onChange, count, storageKey = 'refs' }) {
  const refs = value || Array.from({ length: count }, () => ({ url: '', note: '' }));
  const update = (i, k, v) => {
    const next = [...refs];
    next[i] = { ...next[i], [k]: v };
    onChange(storageKey, next);
  };
  return (
    <div className="space-y-2">
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} className="grid grid-cols-12 gap-2">
          <div className="col-span-12 md:col-span-4">
            <input
              type="text"
              value={refs[i]?.url || ''}
              onChange={e => update(i, 'url', e.target.value)}
              placeholder={`레퍼런스 ${i + 1} URL`}
              className="w-full px-3 py-2 bg-white border border-stone-300 rounded-md text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-stone-900 text-sm"
            />
          </div>
          <div className="col-span-12 md:col-span-8">
            <input
              type="text"
              value={refs[i]?.note || ''}
              onChange={e => update(i, 'note', e.target.value)}
              placeholder="좋은 점 / 아쉬운 점"
              className="w-full px-3 py-2 bg-white border border-stone-300 rounded-md text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-stone-900 text-sm"
            />
          </div>
        </div>
      ))}
    </div>
  );
}

// ========== Section Renderer ==========

function SectionBlock({ section, formData, updateField, sectionRef, isHidden, onToggleHide }) {
  const c = colorMap[section.color] || colorMap.blue;

  // Render hidden section as collapsed header
  if (isHidden) {
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-3 break-inside-avoid">
        <div className="flex items-center justify-between gap-3 px-4 py-3 bg-stone-100/60 border border-dashed border-stone-300 rounded-lg">
          <div className="flex items-center gap-2 min-w-0 flex-1">
            <EyeOff size={14} className="text-stone-400 flex-shrink-0" />
            <span className="text-sm text-stone-500 truncate">{section.title}</span>
            <span className="text-[10px] uppercase tracking-wider text-stone-400 px-2 py-0.5 bg-white border border-stone-200 rounded">숨김</span>
          </div>
          <button
            type="button"
            onClick={() => onToggleHide(section.id)}
            className="flex items-center gap-1 px-2.5 py-1 text-xs font-medium text-stone-600 hover:text-stone-900 hover:bg-white rounded transition-colors flex-shrink-0"
          >
            <Eye size={12} />보이기
          </button>
        </div>
      </section>
    );
  }

  // KV (key-value) section
  if (section.type === 'kv' || section.id === 'cover') {
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-10 break-inside-avoid">
        <SectionHeader section={section} c={c} onToggleHide={onToggleHide} />
        <div className="space-y-5 mt-5">
          {section.fields.map(f => (
            <div key={f.id} className="grid grid-cols-12 gap-3 md:gap-4 items-start">
              <div className="col-span-12 md:col-span-3 md:pt-2.5 flex items-start">
                <FieldLabel htmlFor={f.id} label={f.label} required={f.required} tooltip={f.tooltip} />
              </div>
              <div className="col-span-12 md:col-span-9">
                {f.type === 'date' ? (
                  <DateField id={f.id} value={formData[f.id]} onChange={updateField} />
                ) : f.type === 'multi-check' ? (
                  <MultiCheck id={f.id} value={formData[f.id]} onChange={updateField} options={f.options} />
                ) : f.type === 'textarea' ? (
                  <TextField id={f.id} value={formData[f.id]} onChange={updateField} placeholder={f.placeholder} multi />
                ) : (
                  <TextField id={f.id} value={formData[f.id]} onChange={updateField} placeholder={f.placeholder} />
                )}
              </div>
            </div>
          ))}
        </div>
      </section>
    );
  }

  // Responsibility table
  if (section.type === 'responsibility') {
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-10 break-inside-avoid">
        <SectionHeader section={section} c={c} onToggleHide={onToggleHide} />
        <div className="mt-5 overflow-x-auto rounded-lg border border-stone-200">
          <table className="w-full">
            <thead className="bg-stone-100">
              <tr>
                <th className="text-left py-3 px-4 text-xs font-semibold uppercase tracking-wide text-stone-700">항목</th>
                <th className="py-3 px-2 text-xs font-semibold text-amber-800 w-20 bg-amber-50">보유/제공</th>
                <th className="py-3 px-2 text-xs font-semibold text-emerald-800 w-20 bg-emerald-50">제작사 요청</th>
                <th className="text-left py-3 px-2 text-xs font-semibold uppercase tracking-wide text-stone-700">비고</th>
              </tr>
            </thead>
            <tbody className="bg-white">
              {section.items.map((item, i) => (
                <ResponsibilityRow
                  key={i}
                  index={`${section.id}_${i}`}
                  item={item}
                  value={formData[`resp_${section.id}_${i}`]}
                  onChange={updateField}
                />
              ))}
            </tbody>
          </table>
        </div>
      </section>
    );
  }

  // Simple checklist
  if (section.type === 'checklist') {
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-10 break-inside-avoid">
        <SectionHeader section={section} c={c} onToggleHide={onToggleHide} />
        <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-1 bg-white p-3 rounded-lg border border-stone-200">
          {section.items.map((item, i) => (
            <ChecklistItem
              key={i}
              index={`${section.id}_${i}`}
              item={item}
              value={formData[`cl_${section.id}_${i}`]}
              onChange={updateField}
            />
          ))}
        </div>
      </section>
    );
  }

  // References
  if (section.type === 'references') {
    const refsKey = `refs_${section.id}`;
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-10 break-inside-avoid">
        <SectionHeader section={section} c={c} onToggleHide={onToggleHide} />
        <div className="mt-5">
          <ReferencesTable value={formData[refsKey]} onChange={updateField} count={section.count} storageKey={refsKey} />
        </div>
      </section>
    );
  }

  // Freeform
  if (section.type === 'freeform') {
    return (
      <section ref={sectionRef} id={section.id} className="scroll-mt-32 mb-10 break-inside-avoid">
        <SectionHeader section={section} c={c} onToggleHide={onToggleHide} />
        <div className="mt-5">
          <textarea
            value={formData['freeform_text'] || ''}
            onChange={e => updateField('freeform_text', e.target.value)}
            rows={8}
            placeholder="자유롭게 작성해주세요..."
            className="w-full px-4 py-3 bg-white border border-stone-300 rounded-md text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-stone-900 resize-y text-sm leading-relaxed"
          />
        </div>
      </section>
    );
  }

  return null;
}

function SectionHeader({ section, c, onToggleHide }) {
  return (
    <header className="flex items-start gap-3 pb-3 border-b border-stone-200">
      <div className="flex-1 min-w-0">
        <h3 className="text-xl font-bold text-stone-900 tracking-tight">{section.title}</h3>
        {section.desc && <p className="mt-1 text-sm text-stone-600">{section.desc}</p>}
      </div>
      <span className={`flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium ${c.bg} ${c.text} border ${c.border} flex-shrink-0`}>
        <span className={`w-2 h-2 rounded-full ${c.dot}`} />
        {c.label}
      </span>
      {onToggleHide && section.id !== 'cover' && (
        <button
          type="button"
          onClick={() => onToggleHide(section.id)}
          title="이 섹션 숨기기"
          aria-label="이 섹션 숨기기"
          className="flex-shrink-0 p-1.5 text-stone-400 hover:text-stone-700 hover:bg-stone-100 rounded transition-colors print:hidden"
        >
          <EyeOff size={15} />
        </button>
      )}
    </header>
  );
}

// ========== Main App ==========

function ProjectBriefForm() {
  const [formData, setFormData] = useState({});
  const [isLoaded, setIsLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState('idle'); // idle | saving | saved
  const [tocOpen, setTocOpen] = useState(false);
  const [activeSection, setActiveSection] = useState('cover');
  const [activeTab, setActiveTab] = useState('common');
  const sectionRefs = useRef({});

  // Migrate old single-site fields to new per-site fields
  const migrateData = (data) => {
    if (!data || typeof data !== 'object') return data;
    const m = { ...data };
    const fieldMap = [
      ['is_renewal',   ['is_renewal_b', 'is_renewal_c']],
      ['existing_url', ['existing_url_b', 'existing_url_c']],
      ['main_purpose', ['main_purpose_b', 'main_purpose_c']],
      ['kpi',          ['kpi_b', 'kpi_c']],
      ['launch_date',  ['launch_date_b', 'launch_date_c']],
      ['milestones',   ['milestones_b', 'milestones_c']],
      ['budget_range', ['budget_range_b', 'budget_range_c']],
      ['budget_split', ['budget_split_b', 'budget_split_c']],
    ];
    fieldMap.forEach(([oldKey, [newB, newC]]) => {
      if (m[oldKey] !== undefined && m[newB] === undefined && m[newC] === undefined) {
        m[newB] = m[oldKey];
        m[newC] = m[oldKey];
        delete m[oldKey];
      }
    });
    // References — old 'refs' (was attached to s2b) → new 'refs_b_refs' as default
    if (m.refs && !m['refs_b_refs'] && !m['refs_c_refs']) {
      m['refs_b_refs'] = m.refs;
      delete m.refs;
    }
    return m;
  };

  // Load saved data
  useEffect(() => {
    const load = async () => {
      try {
        if (window.storage) {
          const result = await window.storage.get(STORAGE_KEY);
          if (result?.value) {
            setFormData(migrateData(JSON.parse(result.value)));
          }
        }
      } catch (e) {
        // No saved data — start fresh
      }
      setIsLoaded(true);
    };
    load();
  }, []);

  // Auto-save (debounced)
  useEffect(() => {
    if (!isLoaded) return;
    setSaveStatus('saving');
    const timer = setTimeout(async () => {
      try {
        if (window.storage) {
          await window.storage.set(STORAGE_KEY, JSON.stringify(formData));
        }
        setSaveStatus('saved');
        setTimeout(() => setSaveStatus('idle'), 1500);
      } catch (e) {
        setSaveStatus('idle');
      }
    }, 800);
    return () => clearTimeout(timer);
  }, [formData, isLoaded]);

  // Track active section on scroll — re-runs when tab changes
  useEffect(() => {
    if (!isLoaded) return;
    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            setActiveSection(entry.target.id);
          }
        });
      },
      { rootMargin: '-30% 0px -60% 0px' }
    );
    // Wait one tick for refs to populate after tab switch
    const t = setTimeout(() => {
      Object.values(sectionRefs.current).forEach(ref => {
        if (ref) observer.observe(ref);
      });
    }, 80);
    return () => {
      clearTimeout(t);
      observer.disconnect();
    };
  }, [isLoaded, activeTab]);

  const updateField = (id, value) => {
    setFormData(prev => ({ ...prev, [id]: value }));
  };

  const handleTabChange = (tabId) => {
    if (tabId === activeTab) return;
    setActiveTab(tabId);
    sectionRefs.current = {};
    setActiveSection(null);
    window.scrollTo({ top: 0, behavior: 'auto' });
    setTocOpen(false);
  };

  // Hidden sections helpers
  const hiddenSections = formData[HIDDEN_KEY] || [];
  const isHidden = (sectionId) => hiddenSections.includes(sectionId);
  const toggleHidden = (sectionId) => {
    const next = hiddenSections.includes(sectionId)
      ? hiddenSections.filter(id => id !== sectionId)
      : [...hiddenSections, sectionId];
    updateField(HIDDEN_KEY, next);
  };
  const restoreAllHidden = () => updateField(HIDDEN_KEY, []);

  // Compute progress per tab + overall (excludes hidden sections)
  const progressByTab = useMemo(() => {
    const calc = (sections) => {
      let total = 0, filled = 0;
      sections.forEach(s => {
        if (hiddenSections.includes(s.id)) return; // skip hidden
        if (s.type === 'kv' || s.id === 'cover') {
          s.fields.forEach(f => {
            total++;
            const v = formData[f.id];
            if (v !== undefined && v !== '' && !(Array.isArray(v) && v.length === 0)) filled++;
          });
        } else if (s.type === 'responsibility') {
          s.items.forEach((_, i) => {
            total++;
            const v = formData[`resp_${s.id}_${i}`];
            if (v && (v.owned || v.request)) filled++;
          });
        } else if (s.type === 'checklist') {
          s.items.forEach((_, i) => {
            total++;
            const v = formData[`cl_${s.id}_${i}`];
            if (v && v.checked) filled++;
          });
        } else if (s.type === 'references') {
          total++;
          const v = formData[`refs_${s.id}`];
          if (v && v.some(r => r.url)) filled++;
        } else if (s.type === 'freeform') {
          total++;
          if (formData['freeform_text']) filled++;
        }
      });
      return { total, filled, percent: total ? Math.round((filled / total) * 100) : 0 };
    };

    const byTab = {};
    TABS.forEach(t => {
      byTab[t.id] = calc(SECTIONS.filter(s => getSectionTab(s) === t.id));
    });
    byTab.all = calc(SECTIONS);
    return byTab;
  }, [formData, hiddenSections]);

  const progress = progressByTab.all;

  // Group sections by part — filtered by active tab
  const partGroups = useMemo(() => {
    const filtered = SECTIONS.filter(s => getSectionTab(s) === activeTab);
    const groups = [];
    let current = null;
    filtered.forEach(s => {
      if (s.partTitle || s.id === 'cover' || !current) {
        current = {
          partTitle: s.partTitle || (s.id === 'cover' ? '프로젝트 정보' : ''),
          part: s.part,
          sections: []
        };
        groups.push(current);
      }
      current.sections.push(s);
    });
    return groups;
  }, [activeTab]);

  // Export functions
  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(formData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `project-brief-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importJSON = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        if (typeof parsed !== 'object' || parsed === null || Array.isArray(parsed)) {
          alert('올바른 JSON 형식이 아닙니다.');
          return;
        }
        const migrated = migrateData(parsed);
        const hasExisting = Object.keys(formData).some(k => k !== HIDDEN_KEY && formData[k]);
        let mode = 'replace';
        if (hasExisting) {
          const choice = confirm(
            '기존 작성 내용이 있습니다.\n\n' +
            '확인 → 불러온 내용으로 전체 교체 (기존 내용 삭제)\n' +
            '취소 → 병합 (불러온 항목으로 덮어쓰되 기존 다른 항목은 유지)'
          );
          mode = choice ? 'replace' : 'merge';
        }
        const next = mode === 'replace' ? migrated : { ...formData, ...migrated };
        setFormData(next);
        alert(`불러오기 완료 (${mode === 'replace' ? '전체 교체' : '병합'})`);
      } catch (err) {
        alert('JSON 파싱 실패: ' + err.message);
      }
    };
    reader.readAsText(file);
  };

  const fileInputRef = useRef(null);
  const triggerImport = () => fileInputRef.current?.click();

  const exportText = () => {
    const lines = ['===== 홈페이지 제작 의뢰서 =====', ''];
    SECTIONS.forEach(s => {
      if (hiddenSections.includes(s.id)) return; // skip hidden
      if (s.partTitle) lines.push('', `## ${s.partTitle}`, '');
      lines.push(`### ${s.title}`);
      if (s.type === 'kv' || s.id === 'cover') {
        s.fields.forEach(f => {
          const v = formData[f.id];
          if (v !== undefined && v !== '' && !(Array.isArray(v) && v.length === 0)) {
            const display = Array.isArray(v) ? v.join(', ') : v;
            lines.push(`- ${f.label}: ${display}`);
          }
        });
      } else if (s.type === 'responsibility') {
        s.items.forEach((item, i) => {
          const v = formData[`resp_${s.id}_${i}`];
          if (v && (v.owned || v.request || v.note)) {
            const tags = [];
            if (v.owned) tags.push('[보유]');
            if (v.request) tags.push('[요청]');
            lines.push(`- ${tags.join(' ')} ${item}${v.note ? ` — ${v.note}` : ''}`);
          }
        });
      } else if (s.type === 'checklist') {
        s.items.forEach((item, i) => {
          const v = formData[`cl_${s.id}_${i}`];
          if (v && v.checked) lines.push(`- [✓] ${item}${v.note ? ` — ${v.note}` : ''}`);
        });
      } else if (s.type === 'references') {
        (formData[`refs_${s.id}`] || []).forEach((r, i) => {
          if (r.url || r.note) lines.push(`- ${r.url || '(URL 없음)'}: ${r.note || ''}`);
        });
      } else if (s.type === 'freeform') {
        if (formData['freeform_text']) lines.push(formData['freeform_text']);
      }
      lines.push('');
    });
    const text = lines.join('\n');
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `project-brief-${new Date().toISOString().slice(0, 10)}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const reset = async () => {
    if (!confirm('모든 입력 내용을 초기화합니다. 계속하시겠어요?')) return;
    setFormData({});
    try {
      if (window.storage) await window.storage.delete(STORAGE_KEY);
    } catch (e) {}
  };

  if (!isLoaded) {
    return (
      <div className="min-h-screen bg-stone-50 flex items-center justify-center">
        <div className="text-stone-500 text-sm">불러오는 중...</div>
      </div>
    );
  }

  return (
    <div className="min-h-screen bg-stone-50 text-stone-900" style={{ fontFamily: "'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" }}>
      <style>{`
        @media print {
          .no-print { display: none !important; }
          body { background: white !important; }
          section { break-inside: avoid; page-break-inside: avoid; }
        }
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
        textarea { font-family: inherit; }
      `}</style>

      {/* Top Bar */}
      <header className="no-print sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-stone-200">
        <div className="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center gap-4">
          <button
            type="button"
            onClick={() => setTocOpen(!tocOpen)}
            className="lg:hidden p-2 text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-md transition-colors"
            aria-label="목차"
          >
            {tocOpen ? <X size={20} /> : <Menu size={20} />}
          </button>

          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-2">
              <FileText size={16} className="text-stone-700 flex-shrink-0" />
              <h1 className="text-sm md:text-base font-bold text-stone-900 truncate">홈페이지 제작 의뢰서</h1>
            </div>
            <div className="flex items-center gap-3 mt-1.5">
              <div className="flex-1 max-w-xs h-1.5 bg-stone-200 rounded-full overflow-hidden">
                <div
                  className="h-full bg-stone-900 transition-all duration-500 ease-out"
                  style={{ width: `${progress.percent}%` }}
                />
              </div>
              <span className="text-xs text-stone-600 font-medium whitespace-nowrap">
                {progress.filled}/{progress.total} · {progress.percent}%
              </span>
            </div>
          </div>

          <div className="hidden md:flex items-center gap-1.5 text-xs text-stone-500">
            {saveStatus === 'saving' && <><CircleDashed size={12} className="animate-spin" />저장 중</>}
            {saveStatus === 'saved' && <><Check size={12} className="text-emerald-600" />저장됨</>}
            {saveStatus === 'idle' && <><Save size={12} />자동 저장</>}
          </div>

          <div className="flex items-center gap-1">
            <button
              type="button"
              onClick={exportText}
              title="텍스트로 내보내기"
              className="p-2 text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-md transition-colors"
            >
              <FileDown size={16} />
            </button>
            <button
              type="button"
              onClick={exportJSON}
              title="JSON 백업"
              className="p-2 text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-md transition-colors"
            >
              <Download size={16} />
            </button>
            <button
              type="button"
              onClick={triggerImport}
              title="JSON 불러오기"
              className="p-2 text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-md transition-colors"
            >
              <FileText size={16} />
            </button>
            <input
              ref={fileInputRef}
              type="file"
              accept=".json,application/json"
              className="hidden"
              onChange={(e) => {
                importJSON(e.target.files?.[0]);
                e.target.value = '';
              }}
            />
            <button
              type="button"
              onClick={() => window.print()}
              title="인쇄 / PDF"
              className="p-2 text-stone-600 hover:text-stone-900 hover:bg-stone-100 rounded-md transition-colors"
            >
              <Printer size={16} />
            </button>
            <button
              type="button"
              onClick={reset}
              title="초기화"
              className="p-2 text-stone-600 hover:text-rose-600 hover:bg-rose-50 rounded-md transition-colors"
            >
              <RotateCcw size={16} />
            </button>
          </div>
        </div>

        {/* Tab Navigation */}
        <div className="border-t border-stone-100 bg-white/60">
          <div className="max-w-7xl mx-auto px-4 md:px-6">
            <div className="flex gap-0 overflow-x-auto -mb-px scrollbar-hide">
              {TABS.map(tab => {
                const isActive = activeTab === tab.id;
                const tp = progressByTab[tab.id];
                const Icon = tab.Icon;
                return (
                  <button
                    key={tab.id}
                    type="button"
                    onClick={() => handleTabChange(tab.id)}
                    className={`group relative flex items-center gap-2.5 px-4 md:px-5 py-3 border-b-2 text-sm font-medium whitespace-nowrap transition-all ${
                      isActive
                        ? 'border-stone-900 text-stone-900'
                        : 'border-transparent text-stone-500 hover:text-stone-800 hover:bg-stone-50/80'
                    }`}
                  >
                    <Icon size={16} className={isActive ? 'text-stone-900' : 'text-stone-400 group-hover:text-stone-700'} strokeWidth={isActive ? 2.25 : 2} />
                    <span>{tab.label}</span>
                    <span className={`ml-1 inline-flex items-center justify-center min-w-[2.5rem] h-5 text-[11px] font-semibold rounded-full px-2 transition-colors ${
                      isActive
                        ? tp.percent === 100 ? 'bg-emerald-100 text-emerald-700' : 'bg-stone-900 text-white'
                        : tp.percent > 0 ? 'bg-stone-200 text-stone-700' : 'bg-stone-100 text-stone-400'
                    }`}>
                      {tp.percent}%
                    </span>
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </header>

      <div className="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-10">
        <div className="lg:grid lg:grid-cols-12 lg:gap-8">

          {/* TOC Sidebar */}
          <aside className={`no-print ${tocOpen ? 'block' : 'hidden'} lg:block lg:col-span-3`}>
            <nav className="lg:sticky lg:top-32 mb-6 lg:mb-0 bg-white border border-stone-200 rounded-xl p-4 max-h-[calc(100vh-9rem)] overflow-y-auto">
              <div className="flex items-center justify-between mb-3 px-2">
                <div className="text-xs font-semibold text-stone-500 uppercase tracking-wider">목차</div>
                <div className="text-[10px] font-medium text-stone-400 uppercase tracking-wider">
                  {TABS.find(t => t.id === activeTab)?.label}
                </div>
              </div>
              <div className="space-y-1">
                {partGroups.map((g, gi) => (
                  <div key={gi} className="mb-3">
                    <div className="text-xs font-bold text-stone-700 px-2 py-1.5">{g.partTitle}</div>
                    {g.sections.map(s => {
                      const sectionHidden = isHidden(s.id);
                      return (
                        <div key={s.id} className="flex items-center group">
                          <a
                            href={`#${s.id}`}
                            onClick={(e) => {
                              e.preventDefault();
                              sectionRefs.current[s.id]?.scrollIntoView({ behavior: 'smooth', block: 'start' });
                              setTocOpen(false);
                            }}
                            className={`flex items-center gap-2 px-2 py-1.5 rounded text-xs transition-colors flex-1 min-w-0 ${
                              activeSection === s.id
                                ? 'bg-stone-900 text-white font-medium'
                                : sectionHidden
                                  ? 'text-stone-400 hover:bg-stone-100'
                                  : 'text-stone-600 hover:bg-stone-100 hover:text-stone-900'
                            }`}
                          >
                            <ChevronRight size={12} className={activeSection === s.id ? 'opacity-100' : 'opacity-40'} />
                            <span className={`truncate ${sectionHidden ? 'line-through' : ''}`}>{s.title}</span>
                          </a>
                          {s.id !== 'cover' && (
                            <button
                              type="button"
                              onClick={() => toggleHidden(s.id)}
                              title={sectionHidden ? '보이기' : '숨기기'}
                              className="opacity-0 group-hover:opacity-100 transition-opacity p-1 text-stone-400 hover:text-stone-700 flex-shrink-0"
                            >
                              {sectionHidden ? <Eye size={11} /> : <EyeOff size={11} />}
                            </button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>

              <div className="mt-6 pt-4 border-t border-stone-200 space-y-2 text-xs">
                <div className="font-semibold text-stone-500 uppercase tracking-wider mb-2">범례</div>
                {Object.entries(colorMap).map(([k, c]) => (
                  <div key={k} className="flex items-center gap-2 text-stone-600">
                    <span className={`w-2.5 h-2.5 rounded-full ${c.dot}`} />
                    {c.label}
                  </div>
                ))}
              </div>
            </nav>
          </aside>

          {/* Main Content */}
          <main className="lg:col-span-9">

            {/* Hero — adapts to active tab */}
            {(() => {
              const ct = TABS.find(t => t.id === activeTab);
              const TabIcon = ct.Icon;
              const tp = progressByTab[activeTab];
              const headlines = {
                common: { eyebrow: 'PROJECT BRIEF', sub: '브랜드 소개 사이트 + 자사몰 — 두 사이트에 모두 적용되는 정보' },
                brand: { eyebrow: 'BRAND WEBSITE', sub: '기업/브랜드 인지도와 신뢰도를 위한 코퍼레이트 사이트 요건' },
                commerce: { eyebrow: 'COMMERCE STORE', sub: '상품 판매·결제·주문 관리가 필요한 온라인 쇼핑몰 요건' },
              };
              const h = headlines[activeTab];
              return (
                <div className="mb-12 pb-8 border-b border-stone-200">
                  <div className="flex items-start gap-4 mb-2">
                    <div className="w-11 h-11 md:w-12 md:h-12 rounded-xl bg-stone-900 text-white flex items-center justify-center flex-shrink-0 shadow-sm">
                      <TabIcon size={22} strokeWidth={2} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="text-[11px] font-semibold tracking-[0.22em] text-stone-500 uppercase">
                        {h.eyebrow}
                      </div>
                      <h2 className="mt-1 text-2xl md:text-4xl font-bold tracking-tight text-stone-900 leading-tight">
                        {ct.label}
                      </h2>
                    </div>
                    <div className="hidden md:flex flex-col items-end text-xs text-stone-500">
                      <span className="text-[10px] uppercase tracking-wider">진행률</span>
                      <span className="text-2xl font-bold text-stone-900 tabular-nums">{tp.percent}%</span>
                      <span className="text-[10px] tabular-nums">{tp.filled} / {tp.total}</span>
                    </div>
                  </div>
                  <p className="mt-3 text-base md:text-lg text-stone-600 leading-relaxed">
                    {h.sub}
                  </p>
                  <div className="mt-6 flex flex-wrap items-center gap-2 text-xs">
                    {Object.entries(colorMap).map(([k, c]) => (
                      <span key={k} className={`inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full ${c.bg} ${c.text} border ${c.border}`}>
                        <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`} />
                        {c.label}
                      </span>
                    ))}
                    {hiddenSections.length > 0 && (
                      <button
                        type="button"
                        onClick={restoreAllHidden}
                        className="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-stone-100 text-stone-700 border border-stone-300 hover:bg-stone-200 transition-colors print:hidden"
                      >
                        <Eye size={12} />
                        숨김 {hiddenSections.length}개 모두 보이기
                      </button>
                    )}
                  </div>
                  {activeTab === 'common' && (
                    <p className="mt-6 text-sm text-stone-600 leading-relaxed bg-stone-100/70 rounded-lg p-4 border border-stone-200">
                      본 의뢰서는 두 종류의 홈페이지(브랜드 소개 + 자사몰)를 제작하기 위한 초기 요건 수집 문서입니다.
                      상단 탭으로 <strong className="text-stone-900">공통 / 브랜드 사이트 / 자사몰</strong>을 전환하실 수 있고, 각 항목별 색상 표기를 참고해 작성해 주세요.
                      <strong className="text-stone-900"> 입력 내용은 자동 저장</strong>되며, 상단 버튼으로 텍스트/JSON 내보내기 또는 PDF 인쇄가 가능합니다.
                    </p>
                  )}
                  {activeTab === 'brand' && (
                    <p className="mt-6 text-sm text-stone-600 leading-relaxed bg-sky-50/70 rounded-lg p-4 border border-sky-200">
                      <strong className="text-sky-900">브랜드 사이트 전용 항목</strong>입니다. 회사 정보·예산·브랜드 자산 등 공통 사항은
                      <button onClick={() => handleTabChange('common')} className="mx-1 underline decoration-sky-400 underline-offset-2 hover:text-sky-900 font-medium">공통 사항 탭</button>
                      에서 작성해 주세요.
                    </p>
                  )}
                  {activeTab === 'commerce' && (
                    <p className="mt-6 text-sm text-stone-600 leading-relaxed bg-emerald-50/70 rounded-lg p-4 border border-emerald-200">
                      <strong className="text-emerald-900">자사몰 전용 항목</strong>입니다. 회사 정보·예산·브랜드 자산 등 공통 사항은
                      <button onClick={() => handleTabChange('common')} className="mx-1 underline decoration-emerald-400 underline-offset-2 hover:text-emerald-900 font-medium">공통 사항 탭</button>
                      에서 작성해 주세요.
                    </p>
                  )}
                </div>
              );
            })()}

            {/* Sections */}
            {partGroups.map((g, gi) => (
              <div key={gi}>
                {g.partTitle !== '프로젝트 정보' && partGroups.length > 1 && (
                  <div className="mt-12 mb-8 flex items-center gap-4">
                    <div className="text-xs font-bold tracking-[0.2em] text-stone-400 uppercase">PART {g.part}</div>
                    <div className="h-px flex-1 bg-stone-200" />
                    <div className="text-xs font-semibold text-stone-700">{g.partTitle.replace(/^Part \d+\. /, '')}</div>
                  </div>
                )}
                {g.sections.map(s => (
                  <SectionBlock
                    key={s.id}
                    section={s}
                    formData={formData}
                    updateField={updateField}
                    sectionRef={el => (sectionRefs.current[s.id] = el)}
                    isHidden={isHidden(s.id)}
                    onToggleHide={toggleHidden}
                  />
                ))}
              </div>
            ))}

            {/* Footer */}
            <div className="mt-16 pt-8 border-t border-stone-200">
              {(() => {
                const idx = TABS.findIndex(t => t.id === activeTab);
                const next = idx < TABS.length - 1 ? TABS[idx + 1] : null;
                if (next) {
                  const NextIcon = next.Icon;
                  return (
                    <button
                      type="button"
                      onClick={() => handleTabChange(next.id)}
                      className="w-full mb-6 group relative flex items-center justify-between gap-4 px-6 py-5 bg-white border-2 border-stone-200 hover:border-stone-900 rounded-xl transition-all hover:shadow-md"
                    >
                      <div className="flex items-center gap-4 text-left">
                        <div className="w-10 h-10 rounded-lg bg-stone-100 group-hover:bg-stone-900 flex items-center justify-center transition-colors">
                          <NextIcon size={18} className="text-stone-700 group-hover:text-white transition-colors" />
                        </div>
                        <div>
                          <div className="text-[11px] font-semibold tracking-[0.2em] text-stone-400 uppercase">다음 단계</div>
                          <div className="text-base font-bold text-stone-900">{next.label}</div>
                          <div className="text-xs text-stone-500 mt-0.5">{next.desc}</div>
                        </div>
                      </div>
                      <ChevronRight size={20} className="text-stone-400 group-hover:text-stone-900 group-hover:translate-x-1 transition-all" />
                    </button>
                  );
                }
                return null;
              })()}

              <div className="bg-stone-900 text-white rounded-xl p-6 md:p-8">
                <h3 className="text-lg font-bold mb-2">작성을 마치셨나요?</h3>
                <p className="text-sm text-stone-300 mb-5">
                  전체 탭의 작성 내용을 텍스트 파일로 저장해 이메일로 회신하시거나, PDF로 인쇄하여 미팅 자료로 활용하실 수 있습니다.
                  <span className="ml-1 text-stone-400">전체 진행률 {progress.percent}% ({progress.filled}/{progress.total})</span>
                </p>
                <div className="flex flex-wrap gap-2">
                  <button
                    type="button"
                    onClick={exportText}
                    className="inline-flex items-center gap-2 px-4 py-2 bg-white text-stone-900 rounded-md text-sm font-medium hover:bg-stone-100 transition-colors"
                  >
                    <FileDown size={14} />텍스트 파일 다운로드
                  </button>
                  <button
                    type="button"
                    onClick={exportJSON}
                    className="inline-flex items-center gap-2 px-4 py-2 bg-stone-800 text-white rounded-md text-sm font-medium hover:bg-stone-700 border border-stone-700 transition-colors"
                  >
                    <Download size={14} />JSON 백업 (작업 이어쓰기용)
                  </button>
                  <button
                    type="button"
                    onClick={triggerImport}
                    className="inline-flex items-center gap-2 px-4 py-2 bg-stone-800 text-white rounded-md text-sm font-medium hover:bg-stone-700 border border-stone-700 transition-colors"
                  >
                    <FileText size={14} />JSON 불러오기
                  </button>
                  <button
                    type="button"
                    onClick={() => window.print()}
                    className="inline-flex items-center gap-2 px-4 py-2 bg-stone-800 text-white rounded-md text-sm font-medium hover:bg-stone-700 border border-stone-700 transition-colors"
                  >
                    <Printer size={14} />PDF로 인쇄
                  </button>
                </div>
              </div>
              <p className="mt-6 text-xs text-stone-400 text-center">
                © Project Brief Form · 입력 내용은 브라우저에 자동 저장됩니다.
              </p>
            </div>
          </main>
        </div>
      </div>
    </div>
  );
}

// ===== Render =====
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ProjectBriefForm />);
</script>
</body>
</html>
